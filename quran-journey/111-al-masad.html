<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Masad - 3D Cartoon Doodle | Quran Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header .arabic-title {
            font-family: 'Amiri', serif;
            font-size: 2.5em;
            color: #fff;
            direction: rtl;
        }
        .header h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.2em;
            color: #c9a84c;
            margin-bottom: 4px;
        }
        .header p { color: #888; font-size: 0.85em; }

        /* ===== SLIDE FRAME ===== */
        .slide-frame {
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            border: 3px solid #333;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .slide-drawing {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #FFF9F0;
            position: relative;
            overflow: hidden;
        }

        #sceneSvg { width: 100%; height: 100%; }

        /* ===== PENCIL CURSOR ===== */
        #penCursor {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            width: 52px;
            height: 65px;
            left: 0; top: 0;
            transition: left 0.05s linear, top 0.05s linear;
        }
        #penCursor svg { width: 52px; height: 65px; display: block; }

        /* ===== VERSE TEXT AREA ===== */
        .slide-bottom {
            background: #FFF3E0;
            padding: 24px 30px;
            border-top: 2px dashed #e0c9a0;
            text-align: center;
        }
        .verse-num-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; background: #e67e22; color: #fff;
            border-radius: 50%; font-weight: 700; font-size: 0.85em; margin-bottom: 8px;
            opacity: 0; transition: opacity 0.3s;
        }
        .slide-arabic-text {
            font-family: 'Amiri', serif; font-size: 1.5em; color: #2c3e50;
            direction: rtl; margin-bottom: 4px; min-height: 1.8em;
        }
        .slide-translit-text {
            color: #7f8c8d; font-style: italic; font-size: 0.85em; margin-bottom: 10px;
            min-height: 1.2em;
        }
        .slide-kid-text {
            font-family: 'Caveat', cursive; font-size: 1.25em; color: #34495e; line-height: 1.5;
            min-height: 2em;
        }

        .typewriter-cursor {
            display: inline-block; width: 2px; height: 1em;
            background: currentColor; margin-left: 2px; vertical-align: text-bottom;
            animation: cursorBlink 0.6s step-end infinite;
        }
        .typewriter-cursor.rtl { margin-left: 0; margin-right: 2px; }
        @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ===== CONTROLS ===== */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .controls button {
            background: #1a1a1a; border: 2px solid #333; color: #c9a84c;
            padding: 10px 24px; border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 0.95em; cursor: pointer;
            transition: all 0.3s;
        }
        .controls button:hover { background: #c9a84c; color: #000; }
        .controls button:disabled { opacity: 0.3; cursor: not-allowed; }
        .controls button:disabled:hover { background: #1a1a1a; color: #c9a84c; }

        .verse-indicator {
            color: #c9a84c;
            font-family: 'Caveat', cursive;
            font-size: 1.3em;
            min-width: 80px;
            text-align: center;
        }

        .speed-control {
            margin-top: 12px; color: #666; font-size: 0.85em;
            display: flex; align-items: center; gap: 10px;
        }
        .speed-control input { width: 120px; }

        /* ===== VERSE DOTS ===== */
        .verse-dots {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .verse-dots .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #333;
            border: 1px solid #555;
            cursor: pointer;
            transition: all 0.3s;
        }
        .verse-dots .dot.active {
            background: #c9a84c;
            border-color: #c9a84c;
            transform: scale(1.3);
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.6em; }
            .header .arabic-title { font-size: 1.8em; }
            .slide-bottom { padding: 18px 16px; }
            .slide-kid-text { font-size: 1.1em; }
            .controls button { padding: 8px 16px; font-size: 0.85em; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="arabic-title">سُورَةُ الْمَسَد</div>
        <h1>Surah Al-Masad</h1>
        <p>The Palm Fiber - 5 Verses - Makkan</p>
    </div>

    <div class="slide-frame">
        <div class="slide-drawing" id="slideDrawing">
            <div id="penCursor">
                <svg viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="pencilBody" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="#E8A317"/>
                            <stop offset="20%" stop-color="#FDD835"/>
                            <stop offset="50%" stop-color="#FFEE58"/>
                            <stop offset="80%" stop-color="#FDD835"/>
                            <stop offset="100%" stop-color="#C49000"/>
                        </linearGradient>
                        <linearGradient id="ferruleGrad" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="#9E9E9E"/>
                            <stop offset="30%" stop-color="#E0E0E0"/>
                            <stop offset="60%" stop-color="#BDBDBD"/>
                            <stop offset="100%" stop-color="#757575"/>
                        </linearGradient>
                        <linearGradient id="eraserGrad" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="#E48BA0"/>
                            <stop offset="40%" stop-color="#F8BBD0"/>
                            <stop offset="100%" stop-color="#D4738B"/>
                        </linearGradient>
                        <linearGradient id="woodTip" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="#BA8B5C"/>
                            <stop offset="30%" stop-color="#DEB887"/>
                            <stop offset="70%" stop-color="#D2A76A"/>
                            <stop offset="100%" stop-color="#8B6914"/>
                        </linearGradient>
                        <filter id="pencilShadow">
                            <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="rgba(0,0,0,0.3)"/>
                        </filter>
                    </defs>
                    <g transform="rotate(32, 28, 40)" filter="url(#pencilShadow)">
                        <rect x="22" y="2" width="12" height="8" rx="2" fill="url(#eraserGrad)" stroke="#C0627A" stroke-width="0.6"/>
                        <rect x="24" y="3" width="6" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>
                        <rect x="21" y="10" width="14" height="7" rx="0.5" fill="url(#ferruleGrad)" stroke="#616161" stroke-width="0.5"/>
                        <line x1="21.5" y1="12" x2="34.5" y2="12" stroke="#9E9E9E" stroke-width="0.5"/>
                        <line x1="21.5" y1="14.5" x2="34.5" y2="14.5" stroke="#9E9E9E" stroke-width="0.5"/>
                        <rect x="22" y="17" width="12" height="36" fill="url(#pencilBody)" stroke="#C49000" stroke-width="0.6"/>
                        <rect x="26" y="17" width="3" height="36" fill="rgba(255,255,255,0.25)"/>
                        <rect x="23" y="28" width="10" height="5" rx="0.5" fill="#2E7D32" opacity="0.8"/>
                        <line x1="24.5" y1="30" x2="31.5" y2="30" stroke="#FFF" stroke-width="0.6" opacity="0.7"/>
                        <line x1="25" y1="31.5" x2="31" y2="31.5" stroke="#FFF" stroke-width="0.4" opacity="0.5"/>
                        <polygon points="22,53 34,53 28,68" fill="url(#woodTip)" stroke="#8B6914" stroke-width="0.5"/>
                        <polygon points="28,53 34,53 28,68" fill="rgba(0,0,0,0.1)"/>
                        <polygon points="26,64 30,64 28,72" fill="#333" stroke="#222" stroke-width="0.3"/>
                        <line x1="27.5" y1="65" x2="28" y2="70" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
                    </g>
                </svg>
            </div>
        </div>
        <div class="slide-bottom">
            <div class="verse-num-badge" id="verseBadge">1</div>
            <div class="slide-arabic-text" id="arabicText"></div>
            <div class="slide-translit-text" id="translitText"></div>
            <div class="slide-kid-text" id="kidText"></div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn" onclick="goVerse(currentVerse - 1)">Prev</button>
        <span class="verse-indicator" id="verseIndicator">1 / 5</span>
        <button id="nextBtn" onclick="goVerse(currentVerse + 1)">Next</button>
        <button onclick="replayAnimation()">Replay</button>
    </div>
    <div class="verse-dots" id="verseDots"></div>
    <div class="speed-control">
        <span>Speed:</span>
        <input type="range" id="speedSlider" min="0.3" max="3" step="0.1" value="1">
        <span id="speedLabel">1x</span>
    </div>

    <script>
        const container = document.getElementById('slideDrawing');
        const penCursor = document.getElementById('penCursor');
        const speedSlider = document.getElementById('speedSlider');
        const speedLabel = document.getElementById('speedLabel');
        let animationId = null;
        let speed = 1;
        let currentVerse = 0;
        let isAnimating = false;

        speedSlider.addEventListener('input', () => {
            speed = parseFloat(speedSlider.value);
            speedLabel.textContent = speed + 'x';
        });

        const svgNS = 'http://www.w3.org/2000/svg';

        // ===== VERSE DATA =====
        const verses = [
            {
                num: 1,
                arabic: '\u062A\u064E\u0628\u0651\u064E\u062A\u0652 \u064A\u064E\u062F\u064E\u0627 \u0623\u064E\u0628\u064A \u0644\u064E\u0647\u064E\u0628\u064D \u0648\u064E\u062A\u064E\u0628\u0651',
                translit: "Tabbat yada abi lahabin wa tabb",
                explanation: "May the hands of Abu Lahab be ruined, and ruined is he. His power and arrogance crumbled like walls made of sand.",
                build: buildVerse1
            },
            {
                num: 2,
                arabic: '\u0645\u064E\u0627 \u0623\u064E\u063A\u0652\u0646\u064E\u0649\u0670 \u0639\u064E\u0646\u0652\u0647\u064F \u0645\u064E\u0627\u0644\u064F\u0647\u064F \u0648\u064E\u0645\u064E\u0627 \u0643\u064E\u0633\u064E\u0628',
                translit: "Ma aghna 'anhu maluhu wa ma kasab",
                explanation: "His wealth will not help him, nor what he earned. All the gold in the world cannot save someone from Allah's decree.",
                build: buildVerse2
            },
            {
                num: 3,
                arabic: '\u0633\u064E\u064A\u064E\u0635\u0652\u0644\u064E\u0649\u0670 \u0646\u064E\u0627\u0631\u064B\u0627 \u0630\u064E\u0627\u062A\u064E \u0644\u064E\u0647\u064E\u0628\u064D',
                translit: "Sayasla naran dhata lahab",
                explanation: "He will burn in a Fire of blazing flame. The fire that awaits those who oppose Allah's message.",
                build: buildVerse3
            },
            {
                num: 4,
                arabic: '\u0648\u064E\u0627\u0645\u0652\u0631\u064E\u0623\u064E\u062A\u064F\u0647\u064F \u062D\u064E\u0645\u0651\u064E\u0627\u0644\u064E\u0629\u064E \u0627\u0644\u0652\u062D\u064E\u0637\u064E\u0628',
                translit: "Wamra'atuhu hammalatal hatab",
                explanation: "And his wife, the carrier of firewood. She carried thorns and harmful words, spreading harm against the Prophet.",
                build: buildVerse4
            },
            {
                num: 5,
                arabic: '\u0641\u064A \u062C\u064A\u062F\u0650\u0647\u064E\u0627 \u062D\u064E\u0628\u0652\u0644\u064C \u0645\u0651\u0650\u0646 \u0645\u0651\u064E\u0633\u064E\u062F',
                translit: "Fi jidiha hablun min masad",
                explanation: "Around her neck is a rope of palm fiber. The very tools of her mischief became her own punishment.",
                build: buildVerse5
            }
        ];

        // ===== SVG HELPERS =====
        function el(tag, attrs) {
            const e = document.createElementNS(svgNS, tag);
            for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, String(v));
            return e;
        }
        function pathEl(d, fill, stroke, sw, join) {
            const attrs = { d, fill: fill || 'none', stroke: stroke || 'none' };
            if (sw) attrs['stroke-width'] = sw;
            if (join) { attrs['stroke-linejoin'] = join; attrs['stroke-linecap'] = join; }
            return el('path', attrs);
        }
        function lineEl(x1, y1, x2, y2, stroke, sw) {
            return el('line', { x1, y1, x2, y2, stroke, 'stroke-width': sw, 'stroke-linecap': 'round' });
        }
        function textEl(text, x, y, opts = {}) {
            const e = el('text', {
                x, y, 'text-anchor': opts.anchor || 'middle', 'dominant-baseline': 'middle',
                'font-family': opts.family || 'Caveat, cursive',
                'font-size': opts.size || 22, 'font-weight': opts.weight || 600,
                fill: opts.color || '#2c3e50'
            });
            e.textContent = text;
            return e;
        }
        function createLinearGrad(id, x1, y1, x2, y2, stops) {
            const g = document.createElementNS(svgNS, 'linearGradient');
            g.setAttribute('id', id);
            g.setAttribute('x1', x1); g.setAttribute('y1', y1);
            g.setAttribute('x2', x2); g.setAttribute('y2', y2);
            stops.forEach(([off, col]) => {
                const s = document.createElementNS(svgNS, 'stop');
                s.setAttribute('offset', off); s.setAttribute('stop-color', col);
                g.appendChild(s);
            });
            return g;
        }
        function createRadialGrad(id, cx, cy, r, stops) {
            const g = document.createElementNS(svgNS, 'radialGradient');
            g.setAttribute('id', id);
            g.setAttribute('cx', cx); g.setAttribute('cy', cy); g.setAttribute('r', r);
            stops.forEach(([off, col]) => {
                const s = document.createElementNS(svgNS, 'stop');
                s.setAttribute('offset', off); s.setAttribute('stop-color', col);
                g.appendChild(s);
            });
            return g;
        }
        function cartoonSparkle(cx, cy, size) {
            const g = document.createElementNS(svgNS, 'g');
            g.setAttribute('filter', 'url(#glow)');
            const s = size;
            g.appendChild(pathEl(
                `M${cx},${cy-s} L${cx+s*0.25},${cy-s*0.25} L${cx+s},${cy} L${cx+s*0.25},${cy+s*0.25} L${cx},${cy+s} L${cx-s*0.25},${cy+s*0.25} L${cx-s},${cy} L${cx-s*0.25},${cy-s*0.25} Z`,
                '#FFF9C4', '#FFD54F', 1, 'round'));
            return g;
        }

        // ===== COMMON DEFS =====
        function addCommonDefs(svg) {
            const defs = document.createElementNS(svgNS, 'defs');

            // Dark dramatic sky
            defs.appendChild(createLinearGrad('darkSky', '0%','0%','0%','100%',
                [['0%','#1a0a0a'],['30%','#2d1010'],['60%','#3d1515'],['100%','#1a0505']]));
            // Fire sky
            defs.appendChild(createLinearGrad('fireSky', '0%','0%','0%','100%',
                [['0%','#0d0d0d'],['20%','#1a0505'],['50%','#4d1a00'],['80%','#cc3300'],['100%','#ff6600']]));
            // Crumbling wall gradient
            defs.appendChild(createLinearGrad('wallGrad', '0%','0%','0%','100%',
                [['0%','#8D8D8D'],['30%','#6D6D6D'],['60%','#5D5D5D'],['100%','#3D3D3D']]));
            // Gold coin gradient
            defs.appendChild(createLinearGrad('coinGrad', '0%','0%','100%','100%',
                [['0%','#FFD700'],['30%','#FFF176'],['60%','#FFD54F'],['100%','#C49000']]));
            // Flame gradient
            defs.appendChild(createLinearGrad('flameGrad', '0%','100%','0%','0%',
                [['0%','#FF6600'],['30%','#FF4500'],['60%','#FF0000'],['100%','#CC0000']]));
            // Inner flame
            defs.appendChild(createLinearGrad('innerFlame', '0%','100%','0%','0%',
                [['0%','#FFFF00'],['40%','#FFD700'],['100%','#FF8C00']]));
            // Rope gradient
            defs.appendChild(createLinearGrad('ropeGrad', '0%','0%','100%','0%',
                [['0%','#8B7355'],['25%','#C4A76C'],['50%','#A08050'],['75%','#C4A76C'],['100%','#6B5335']]));
            // Thorn branch
            defs.appendChild(createLinearGrad('thornGrad', '0%','0%','100%','0%',
                [['0%','#4E342E'],['50%','#6D4C41'],['100%','#3E2723']]));
            // Ground dark
            defs.appendChild(createLinearGrad('darkGround', '0%','0%','0%','100%',
                [['0%','#2d1f1f'],['50%','#1a1210'],['100%','#0d0808']]));
            // Ash ground
            defs.appendChild(createLinearGrad('ashGround', '0%','0%','0%','100%',
                [['0%','#4a4a4a'],['50%','#333'],['100%','#1a1a1a']]));

            // Fire glow radial
            defs.appendChild(createRadialGrad('fireGlow', '50%','80%','60%',
                [['0%','rgba(255,100,0,0.5)'],['50%','rgba(255,60,0,0.2)'],['100%','rgba(255,0,0,0)']]));
            // Ember glow
            defs.appendChild(createRadialGrad('emberGlow', '50%','50%','50%',
                [['0%','rgba(255,200,0,0.8)'],['40%','rgba(255,100,0,0.4)'],['100%','rgba(255,0,0,0)']]));
            // Coin shine
            defs.appendChild(createRadialGrad('coinShine', '30%','30%','50%',
                [['0%','#FFFFFF'],['30%','#FFF9C4'],['60%','#FFD54F'],['100%','#C49000']]));

            const glow = document.createElementNS(svgNS, 'filter');
            glow.setAttribute('id', 'glow');
            glow.innerHTML = '<feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>';
            defs.appendChild(glow);

            const fireGlowFilter = document.createElementNS(svgNS, 'filter');
            fireGlowFilter.setAttribute('id', 'fireGlowFilter');
            fireGlowFilter.innerHTML = '<feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>';
            defs.appendChild(fireGlowFilter);

            const shadow = document.createElementNS(svgNS, 'filter');
            shadow.setAttribute('id', 'softShadow');
            shadow.setAttribute('x','-20%'); shadow.setAttribute('y','-20%');
            shadow.setAttribute('width','140%'); shadow.setAttribute('height','140%');
            shadow.innerHTML = '<feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="rgba(0,0,0,0.25)"/>';
            defs.appendChild(shadow);

            const dotPattern = document.createElementNS(svgNS, 'pattern');
            dotPattern.setAttribute('id','dots'); dotPattern.setAttribute('width','18');
            dotPattern.setAttribute('height','18'); dotPattern.setAttribute('patternUnits','userSpaceOnUse');
            dotPattern.appendChild(el('circle', { cx:9, cy:9, r:0.7, fill:'rgba(100,80,60,0.15)' }));
            defs.appendChild(dotPattern);

            svg.appendChild(defs);
            return defs;
        }

        function initSvg() {
            const old = document.getElementById('sceneSvg');
            if (old) old.remove();
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('id', 'sceneSvg');
            svg.setAttribute('viewBox', '0 0 900 506');
            svg.setAttribute('xmlns', svgNS);
            container.appendChild(svg);
            addCommonDefs(svg);
            svg.appendChild(el('rect', { width:900, height:506, fill:'#FFF9F0' }));
            svg.appendChild(el('rect', { width:900, height:506, fill:'url(#dots)' }));
            const groups = [];
            function add(gi, node) {
                if (!groups[gi]) groups[gi] = [];
                groups[gi].push(node);
                svg.appendChild(node);
            }
            return { svg, groups, add };
        }

        // ===== Helper: draw a cartoon flame =====
        function cartoonFlame(cx, cy, w, h, fill, stroke) {
            const hw = w / 2;
            return pathEl(
                `M${cx},${cy} Q${cx - hw * 0.8},${cy - h * 0.3} ${cx - hw},${cy - h * 0.5} Q${cx - hw * 0.6},${cy - h * 0.75} ${cx - hw * 0.3},${cy - h * 0.85} Q${cx},${cy - h} ${cx + hw * 0.3},${cy - h * 0.85} Q${cx + hw * 0.6},${cy - h * 0.75} ${cx + hw},${cy - h * 0.5} Q${cx + hw * 0.8},${cy - h * 0.3} ${cx},${cy} Z`,
                fill || 'url(#flameGrad)', stroke || '#CC3300', 2, 'round');
        }

        // ===== Helper: draw ember particle =====
        function cartoonEmber(cx, cy, size) {
            const g = document.createElementNS(svgNS, 'g');
            g.setAttribute('filter', 'url(#glow)');
            g.appendChild(el('circle', { cx, cy, r: size, fill: '#FF6600', opacity: 0.9 }));
            g.appendChild(el('circle', { cx, cy, r: size * 0.5, fill: '#FFCC00' }));
            return g;
        }

        // ===== Helper: draw a crack =====
        function drawCrack(x1, y1, x2, y2, branches) {
            const g = document.createElementNS(svgNS, 'g');
            g.appendChild(lineEl(x1, y1, x2, y2, '#1a1a1a', 2.5));
            if (branches) {
                branches.forEach(([bx, by]) => {
                    g.appendChild(lineEl(x2, y2, bx, by, '#1a1a1a', 1.5));
                });
            }
            return g;
        }

        // ===== VERSE 1: TABBAT YADA - Crumbling walls, destruction =====
        function buildVerse1() {
            const { svg, groups, add } = initSvg();

            // G0: Dark dramatic sky
            add(0, pathEl('M0,0 L900,0 L900,506 L0,506 Z', 'url(#darkSky)', 'none', 0));

        // ===== ANIMATION ENGINE =====
        function hideAllPaths(groups) {
            groups.forEach(group => {
                group.forEach(item => {
                    if (item.tagName === 'g') {
                        item.querySelectorAll('path, line, circle, ellipse, rect, polygon').forEach(child => hideElement(child));
                        item.style.opacity = '0';
                    } else {
                        hideElement(item);
                    }
                });
            });
        }
        function hideElement(el) {
            try {
                if (el.getTotalLength) {
                    const len = el.getTotalLength();
                    el.style.strokeDasharray = len;
                    el.style.strokeDashoffset = len;
                    el.style.fillOpacity = '0';
                    return;
                }
            } catch(e) {}
            el.style.opacity = '0';
        }
        function animateGroup(group, duration) {
            return new Promise(resolve => {
                const startTime = performance.now();
                const elements = [];
                group.forEach(item => {
                    if (item.tagName === 'g') {
                        item.querySelectorAll('path, line, circle, ellipse, rect, polygon').forEach(child => {
                            elements.push(prepElement(child));
                        });
                        elements.push({ el: item, hasPath: false, isGroup: true });
                    } else {
                        elements.push(prepElement(item));
                    }
                });
                function prepElement(el) {
                    try {
                        if (el.getTotalLength) {
                            const len = el.getTotalLength();
                            el.style.strokeDasharray = len;
                            el.style.strokeDashoffset = len;
                            el.style.fillOpacity = '0';
                            return { el, len, hasPath: true };
                        }
                    } catch(e) {}
                    el.style.opacity = '0';
                    return { el, hasPath: false };
                }
                function tick(now) {
                    const elapsed = (now - startTime) * speed;
                    const t = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - t, 3);
                    elements.forEach(({ el, len, hasPath, isGroup }) => {
                        if (isGroup) { el.style.opacity = eased; }
                        else if (hasPath) {
                            el.style.strokeDashoffset = len * (1 - eased);
                            if (eased > 0.5) el.style.fillOpacity = (eased - 0.5) / 0.5;
                        } else { el.style.opacity = eased; }
                    });
                    if (t < 1) {
                        for (let j = elements.length - 1; j >= 0; j--) {
                            if (elements[j].hasPath) {
                                try {
                                    const pt = elements[j].el.getPointAtLength(elements[j].len * eased);
                                    if (pt && isFinite(pt.x) && isFinite(pt.y)) { movePen(pt.x, pt.y); break; }
                                } catch(e) {}
                            }
                        }
                        animationId = requestAnimationFrame(tick);
                    } else {
                        elements.forEach(({ el, hasPath, isGroup }) => {
                            if (isGroup) el.style.opacity = '1';
                            else if (hasPath) { el.style.strokeDashoffset = '0'; el.style.fillOpacity = '1'; }
                            else el.style.opacity = '1';
                        });
                        resolve();
                    }
                }
                animationId = requestAnimationFrame(tick);
            });
        }

        function movePen(svgX, svgY) {
            const svg = document.getElementById('sceneSvg');
            if (!svg) return;
            const rect = svg.getBoundingClientRect();
            penCursor.style.opacity = '1';
            penCursor.style.left = (svgX * rect.width / 900 - 18) + 'px';
            penCursor.style.top = (svgY * rect.height / 506 - 58) + 'px';
        }
        function hidePen() { penCursor.style.opacity = '0'; }

        // ===== TYPEWRITER =====
        let typewriterAbort = false;
        function typewrite(element, text, opts = {}) {
            return new Promise(resolve => {
                const charDelay = opts.charDelay || 40;
                element.textContent = '';
                const cursor = document.createElement('span');
                cursor.className = 'typewriter-cursor' + (opts.rtl ? ' rtl' : '');
                element.appendChild(cursor);
                let i = 0;
                function next() {
                    if (typewriterAbort) { resolve(); return; }
                    if (i < text.length) {
                        element.insertBefore(document.createTextNode(text[i]), cursor);
                        i++;
                        setTimeout(next, charDelay / speed);
                    } else { setTimeout(() => { cursor.remove(); resolve(); }, 300 / speed); }
                }
                next();
            });
        }

        function resetBottomText() {
            document.getElementById('verseBadge').style.opacity = '0';
            ['arabicText','translitText','kidText'].forEach(id => document.getElementById(id).textContent = '');
        }

        async function animateBottomText(verse) {
            const badge = document.getElementById('verseBadge');
            badge.textContent = verse.num;
            badge.style.opacity = '1';
            await new Promise(r => setTimeout(r, 200 / speed));
            await typewrite(document.getElementById('arabicText'), verse.arabic, { charDelay: 50, rtl: true });
            await new Promise(r => setTimeout(r, 100 / speed));
            await typewrite(document.getElementById('translitText'), verse.translit, { charDelay: 30 });
            await new Promise(r => setTimeout(r, 100 / speed));
            await typewrite(document.getElementById('kidText'), verse.explanation, { charDelay: 20 });
        }

        // ===== PLAY VERSE =====
        async function playVerse(index) {
            if (animationId) cancelAnimationFrame(animationId);
            typewriterAbort = true;
            await new Promise(r => setTimeout(r, 50));
            typewriterAbort = false;
            isAnimating = true;
            resetBottomText();
            updateControls();

            const verse = verses[index];
            const { groups } = verse.build();
            hideAllPaths(groups);

            // Auto-calculate timing: ~600ms per group
            const gap = 100;
            let textStarted = false;
            let textPromise = null;
            const textTrigger = Math.floor(groups.length * 0.4);

            for (let i = 0; i < groups.length; i++) {
                if (typewriterAbort) break;
                await animateGroup(groups[i], 600);
                if (i === textTrigger && !textStarted) {
                    textStarted = true;
                    textPromise = animateBottomText(verse);
                }
                if (i < groups.length - 1) await new Promise(r => setTimeout(r, gap / speed));
            }

            hidePen();
            if (!textStarted) textPromise = animateBottomText(verse);
            if (textPromise) await textPromise;
            isAnimating = false;
            updateControls();
        }

        // ===== NAVIGATION =====
        function goVerse(index) {
            if (index < 0 || index >= verses.length) return;
            currentVerse = index;
            updateControls();
            playVerse(index);
        }

        function replayAnimation() { playVerse(currentVerse); }

        function updateControls() {
            document.getElementById('prevBtn').disabled = currentVerse === 0;
            document.getElementById('nextBtn').disabled = currentVerse === verses.length - 1;
            document.getElementById('verseIndicator').textContent = `${currentVerse + 1} / ${verses.length}`;
            document.querySelectorAll('.verse-dots .dot').forEach((d, i) => {
                d.classList.toggle('active', i === currentVerse);
            });
        }

        // ===== INIT =====
        function initDots() {
            const dotsEl = document.getElementById('verseDots');
            verses.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goVerse(i);
                dotsEl.appendChild(dot);
            });
        }

        // Keyboard nav
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goVerse(currentVerse + 1);
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goVerse(currentVerse - 1);
            if (e.key === 'r' || e.key === 'R') replayAnimation();
        });

        window.addEventListener('load', () => {
            initDots();
            updateControls();
            setTimeout(() => playVerse(0), 500);
        });
    </script>
</body>
</html>
