<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6848"/>
      <stop offset="100%" stop-color="#0d4030"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Book cover -->
  <rect x="7" y="5" width="18" height="22" rx="2" fill="url(#cover)" stroke="#c9a84c" stroke-width="1"/>
  <!-- Spine detail -->
  <line x1="9.5" y1="5" x2="9.5" y2="27" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
  <!-- Decorative border -->
  <rect x="11" y="8" width="12" height="16" rx="1" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.6"/>
  <!-- Center ornament -->
  <circle cx="17" cy="16" r="3" fill="none" stroke="#c9a84c" stroke-width="0.8"/>
  <circle cx="17" cy="16" r="1.2" fill="#c9a84c"/>
  <!-- Corner dots -->
  <circle cx="12.5" cy="9.5" r="0.6" fill="#c9a84c" opacity="0.5"/>
  <circle cx="21.5" cy="9.5" r="0.6" fill="#c9a84c" opacity="0.5"/>
  <circle cx="12.5" cy="22.5" r="0.6" fill="#c9a84c" opacity="0.5"/>
  <circle cx="21.5" cy="22.5" r="0.6" fill="#c9a84c" opacity="0.5"/>
  <!-- Bookmark ribbon -->
  <path d="M20 5 L20 11 L21.5 9.5 L23 11 L23 5" fill="#c9a84c"/>
</svg>
